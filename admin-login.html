<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Admin Login</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    body{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--color-primary)}
    .login-box{background:#fff;width:100%;max-width:400px;border-radius:12px;overflow:hidden;box-shadow:0 24px 80px rgba(0,0,0,.3)}
    .login-header{background:var(--color-primary);color:#fff;padding:36px;text-align:center}
    .login-header h1{font-family:var(--font-heading);font-size:2rem;font-weight:300;color:#fff;letter-spacing:.06em}
    .login-header p{color:rgba(255,255,255,.55);font-size:.8rem;margin-top:6px;letter-spacing:.08em}
    .login-body{padding:36px}
    .login-field{display:flex;flex-direction:column;gap:8px;margin-bottom:20px}
    .login-field label{font-size:.72rem;letter-spacing:.12em;text-transform:uppercase;font-weight:500;color:#555}
    .login-field input{padding:12px 16px;border:1px solid #e0ddd8;border-radius:6px;font-size:.95rem;transition:border-color .2s}
    .login-field input:focus{outline:none;border-color:#1a1a1a}
    .login-btn{width:100%;padding:14px;background:#1a1a1a;color:#fff;border:none;border-radius:6px;font-size:.8rem;letter-spacing:.14em;text-transform:uppercase;cursor:pointer;transition:opacity .2s}
    .login-btn:hover{opacity:.85}
    .login-error{color:#c0392b;font-size:.82rem;margin-top:12px;display:none;text-align:center}
    .back-link{display:block;text-align:center;margin-top:16px;font-size:.78rem;color:#aaa}
    .back-link a{color:#888}
    .dark-mode .login-box{background:#1c1c1a;color:#f0ede8}
    .dark-mode .login-field input{background:#111110;border-color:#2e2e2b;color:#f0ede8}
    .dark-mode .login-field label{color:#aaa}
    .timeout-notice{background:#fff3cd;color:#856404;padding:12px 16px;font-size:.82rem;text-align:center;display:none}
  </style>
</head>
<body>
<div class="login-box">
  <div class="login-header">
    <h1 id="admin-logo">LUXE</h1>
    <p>Admin Panel</p>
  </div>
  <div id="timeout-notice" class="timeout-notice">Session expired due to inactivity.</div>
  <div class="login-body">
    <div class="login-field">
      <label>Password</label>
      <input type="password" id="pw-input" placeholder="Enter admin password" autocomplete="current-password">
    </div>
    <button class="login-btn" id="login-btn">Sign In</button>
    <div class="login-error" id="login-error">Incorrect password. Please try again.</div>
    <div class="back-link"><a href="index.html">← Back to Store</a></div>
  </div>
</div>

<script src="js/store.js"></script>
<script>
document.addEventListener('DOMContentLoaded', async () => {
  await new Promise(r => setTimeout(r, 80));
  const cfg = LUXE.getConfig();
  if (cfg.store) document.getElementById('admin-logo').textContent = cfg.store.logo_text || cfg.store.name || 'LUXE';

  // Show timeout notice
  if (new URLSearchParams(window.location.search).get('timeout')) {
    document.getElementById('timeout-notice').style.display = 'block';
  }

  // If already logged in, redirect
  if (LUXE.isAdmin()) { window.location.href = 'admin/dashboard.html'; return; }

  const doLogin = () => {
    const pw = document.getElementById('pw-input').value;
    if (LUXE.adminLogin(pw)) {
      window.location.href = 'admin/dashboard.html';
    } else {
      document.getElementById('login-error').style.display = 'block';
      document.getElementById('pw-input').value = '';
      document.getElementById('pw-input').focus();
    }
  };

  document.getElementById('login-btn').addEventListener('click', doLogin);
  document.getElementById('pw-input').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
  document.getElementById('pw-input').focus();
});
</script>
</body>
</html>
