<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Newsletter — LUXE Admin</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>
<div class="adm-layout">
  <div class="adm-sidebar" id="adm-sidebar">
    <div class="adm-sidebar-logo"><span id="sidebar-brand">LUXE</span><span>Admin Panel</span></div>
    <nav class="adm-nav">
      <div class="adm-nav-section">Overview</div>
      <a href="dashboard.html">◈ Dashboard</a><a href="orders.html">📦 Orders</a>
      <div class="adm-nav-section">Catalog</div>
      <a href="products.html">👗 Products</a><a href="cards.html">▤ Homepage Cards</a>
      <div class="adm-nav-section">Store</div>
      <a href="branding.html">✦ Branding</a><a href="design.html">🎨 Design</a>
      <a href="content.html">✏ Content</a><a href="images.html">🖼 Images</a>
      <a href="pages.html">📄 Pages</a><a href="payment.html">💳 Payment</a>
      <div class="adm-nav-section">Customers</div>
      <a href="newsletter.html">✉ Newsletter</a><a href="messages.html">💬 Messages</a>
      <div class="adm-nav-section">Settings</div>
      <a href="settings.html">⚙ Settings</a>
    </nav>
    <div class="adm-sidebar-footer"><a href="../index.html" target="_blank">🏬 View Store</a></div>
  </div>
  <div class="adm-main">
    <div class="adm-topbar">
      <div class="flex-gap"><button id="sidebar-toggle" style="font-size:1.2rem;color:#888">☰</button><h2 id="adm-page-title">Newsletter Subscribers</h2></div>
      <div class="adm-topbar-actions">
        <button class="adm-btn adm-btn-outline adm-btn-sm" id="export-nl">Export CSV</button>
        <button class="adm-logout-btn">Sign Out</button>
      </div>
    </div>
    <div class="adm-content">
      <div class="adm-card">
        <div class="adm-card-header">
          <h3>Subscribers (<span id="sub-count">0</span>)</h3>
        </div>
        <div class="adm-card-body" style="padding:0">
          <div class="adm-table-wrap">
            <table class="adm-table">
              <thead><tr><th>#</th><th>Email</th><th>Action</th></tr></thead>
              <tbody id="nl-table"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<div id="adm-toast"></div>
<script src="../js/store.js"></script>
<script src="js/admin.js"></script>
<script>
document.addEventListener('DOMContentLoaded', async () => {
  const ok = await initAdminPage('Newsletter');
  if (!ok) return;
  renderList();
  document.getElementById('export-nl').addEventListener('click', () => {
    const list = LUXE.getNewsletter();
    if (!list.length) { adminToast('No subscribers yet.'); return; }
    const csv = 'Email\n' + list.join('\n');
    const a = document.createElement('a'); a.href = 'data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
    a.download = 'newsletter_subscribers.csv'; a.click(); adminToast('Exported!','success');
  });
});
function renderList() {
  const list = LUXE.getNewsletter();
  document.getElementById('sub-count').textContent = list.length;
  const tbody = document.getElementById('nl-table');
  if (!list.length) { tbody.innerHTML='<tr><td colspan="3" style="text-align:center;padding:32px;color:#aaa">No subscribers yet.</td></tr>'; return; }
  tbody.innerHTML = list.map((email,i) => `<tr><td style="color:#aaa">${i+1}</td><td>${email}</td><td><button class="adm-btn adm-btn-danger adm-btn-xs" onclick="removeSubscriber(${i})">Remove</button></td></tr>`).join('');
}
function removeSubscriber(i) {
  adminConfirm('Remove this subscriber?', () => {
    const list = LUXE.getNewsletter(); list.splice(i,1);
    localStorage.setItem(LUXE.KEYS.NEWSLETTER, JSON.stringify(list)); renderList(); adminToast('Removed.');
  });
}
</script>
</body></html>
