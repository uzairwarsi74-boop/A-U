<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Images — LUXE Admin</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>
<div class="adm-layout">
  <div class="adm-sidebar" id="adm-sidebar">
    <div class="adm-sidebar-logo"><span id="sidebar-brand">LUXE</span><span>Admin Panel</span></div>
    <nav class="adm-nav">
      <div class="adm-nav-section">Overview</div>
      <a href="dashboard.html">◈ Dashboard</a><a href="orders.html">📦 Orders</a>
      <div class="adm-nav-section">Catalog</div>
      <a href="products.html">👗 Products</a><a href="cards.html">▤ Homepage Cards</a>
      <div class="adm-nav-section">Store</div>
      <a href="branding.html">✦ Branding</a><a href="design.html">🎨 Design</a>
      <a href="content.html">✏ Content</a><a href="images.html">🖼 Images</a>
      <a href="pages.html">📄 Pages</a><a href="payment.html">💳 Payment</a>
      <div class="adm-nav-section">Customers</div>
      <a href="newsletter.html">✉ Newsletter</a><a href="messages.html">💬 Messages</a>
      <div class="adm-nav-section">Settings</div>
      <a href="settings.html">⚙ Settings</a>
    </nav>
    <div class="adm-sidebar-footer"><a href="../index.html" target="_blank">🏬 View Store</a></div>
  </div>
  <div class="adm-main">
    <div class="adm-topbar">
      <div class="flex-gap"><button id="sidebar-toggle" style="font-size:1.2rem;color:#888">☰</button><h2 id="adm-page-title">Images</h2></div>
      <div class="adm-topbar-actions">
        <button class="adm-btn adm-btn-success" id="save-images">Save Images</button>
        <button class="adm-logout-btn">Sign Out</button>
      </div>
    </div>
    <div class="adm-content">
      <div class="adm-card">
        <div class="adm-card-header"><h3>Page Images</h3><span style="font-size:.8rem;color:#aaa">Upload or enter image URLs for each section</span></div>
        <div class="adm-card-body">

          <div id="images-grid" style="display:grid;grid-template-columns:1fr 1fr;gap:24px"></div>

        </div>
      </div>
    </div>
  </div>
</div>
<div id="adm-toast"></div>
<script src="../js/store.js"></script>
<script src="js/admin.js"></script>
<script>
const IMAGE_SLOTS = [
  { key:'hero.background_image', label:'Hero Banner Background', desc:'Main homepage hero image (recommended: 1600×900px)' },
  { key:'about.image',           label:'About Page Image',       desc:'Image shown on About page (recommended: 800×1000px)' },
];

let imgData = {};

document.addEventListener('DOMContentLoaded', async () => {
  const ok = await initAdminPage('Images');
  if (!ok) return;
  const cfg = LUXE.getConfig();

  const grid = document.getElementById('images-grid');
  grid.innerHTML = IMAGE_SLOTS.map(slot => {
    // Resolve current value from nested path
    const parts = slot.key.split('.');
    let curr = cfg;
    for (const p of parts) curr = curr?.[p];
    curr = curr || '';

    return `<div class="adm-card" style="margin-bottom:0">
      <div class="adm-card-header" style="padding:12px 16px"><h3 style="font-size:.9rem">${slot.label}</h3></div>
      <div class="adm-card-body">
        <p style="font-size:.78rem;color:#aaa;margin-bottom:12px">${slot.desc}</p>
        <div class="adm-field" style="margin-bottom:10px">
          <label>Image URL</label>
          <input type="text" class="img-url-input" data-key="${slot.key}" value="${curr}" placeholder="https://...">
        </div>
        <div class="img-upload-wrap" data-key="${slot.key}" style="margin-bottom:8px">
          <input type="file" class="img-file-input" data-key="${slot.key}" accept="image/*">
          <img class="img-preview img-upload-preview" data-key="${slot.key}" src="${curr||''}" style="display:${curr?'block':'none'};max-height:140px;object-fit:cover;width:100%;border-radius:4px">
          <div class="img-upload-label" style="${curr?'display:none':''}">Click to upload</div>
        </div>
        ${curr?`<button class="adm-btn adm-btn-outline adm-btn-xs" onclick="clearImg('${slot.key}')">Remove Image</button>`:''}
      </div>
    </div>`;
  }).join('');

  // Bind file inputs
  document.querySelectorAll('.img-file-input').forEach(input => {
    input.addEventListener('change', () => {
      const key  = input.dataset.key;
      const file = input.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = e => {
        imgData[key] = e.target.result;
        const preview = document.querySelector(`.img-preview[data-key="${key}"]`);
        if (preview) { preview.src = e.target.result; preview.style.display = 'block'; }
        const urlInput = document.querySelector(`.img-url-input[data-key="${key}"]`);
        if (urlInput) urlInput.value = e.target.result;
      };
      reader.readAsDataURL(file);
    });
  });

  // Bind URL inputs
  document.querySelectorAll('.img-url-input').forEach(input => {
    input.addEventListener('change', () => {
      const key = input.dataset.key;
      const preview = document.querySelector(`.img-preview[data-key="${key}"]`);
      if (preview && input.value) { preview.src = input.value; preview.style.display = 'block'; }
    });
  });

  document.getElementById('save-images').addEventListener('click', save);
});

function clearImg(key) {
  imgData[key] = '';
  const preview  = document.querySelector(`.img-preview[data-key="${key}"]`);
  const urlInput = document.querySelector(`.img-url-input[data-key="${key}"]`);
  if (preview)  { preview.src = ''; preview.style.display = 'none'; }
  if (urlInput) urlInput.value = '';
  adminToast('Image removed. Click Save to confirm.');
}

function save() {
  const cfg = LUXE.getConfig();
  // Apply URL inputs
  document.querySelectorAll('.img-url-input').forEach(input => {
    const key = input.dataset.key;
    const parts = key.split('.');
    let obj = cfg;
    for (let i = 0; i < parts.length - 1; i++) {
      if (!obj[parts[i]]) obj[parts[i]] = {};
      obj = obj[parts[i]];
    }
    obj[parts[parts.length-1]] = imgData[key] !== undefined ? imgData[key] : input.value;
  });
  LUXE.setConfig(cfg);
  adminToast('Images saved! Refresh the store to see changes.','success');
}
</script>
</body></html>
